version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kard-cnae-postgres
    environment:
      POSTGRES_USER: kard
      POSTGRES_PASSWORD: kard123
      POSTGRES_DB: kard_cnae
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: